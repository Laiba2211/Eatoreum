<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <!-- Fonts: @fontsource/* imported in main.jsx — avoids render-blocking Google Fonts CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eatoreum</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("eatoreum_theme"); /* THEME_STORAGE_KEY in ThemeContext.jsx */
          document.documentElement.setAttribute(
            "data-theme",
            t === "light" || t === "dark" ? t : "dark"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
